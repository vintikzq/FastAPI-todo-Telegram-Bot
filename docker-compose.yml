services:
  api:
    build: ../FastAPI-todo-API       
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000" 
    ports:
      - "8000:8000" 
    depends_on:
      db:
        condition: service_healthy  
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - ../FastAPI-todo-API:/app    
  db:
    image: postgres:16-alpine
    container_name: tasks_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: bot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    command: python src/main.py
    depends_on:
       api:
          condition: service_started
       redis:
          condition: service_healthy
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - INTERNAL_BOT_SECRET=${INTERNAL_BOT_SECRET}
      - TOKEN_TTL_SEC=${TOKEN_TTL_SEC}
      - API_HOST=api
      - REDIS_HOST=redis
      - PYTHONPATH=/app
    
volumes:
  postgres_data: